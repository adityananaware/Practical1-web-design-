<!DOCTYPE html>
<html>
<head>
    <title>CSS Styling</title>

    <link rel="stylesheet" href="prac3a.css">

    <style>
        .box {
            color: white;
            font-family: Arial, sans-serif;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            background-color: teal;
            border: 3px solid orange;
            border-radius: 10px;
            padding: 20px;
            width: 300px;
            margin: 20px auto;
        }
    </style>

</head>

<body>

    <!-- Inline CSS -->
    <p style="color:red; font-size:16px; background-color:yellow; border:2px solid green; padding:10px;">
        This is Inline CSS styled paragraph.
    </p>

    <!-- Internal CSS -->
    <p class="box">
        This is Internal CSS styled box.
    </p>

    <!-- External CSS -->
    <p class="box1">
        This is External CSS styled box.
    </p>

</body>
</html>
